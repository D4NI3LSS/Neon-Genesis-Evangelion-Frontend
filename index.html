<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ff6b00" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <title>NERV DATABASE</title>
</head>
<body>

  <div class="scanlines"></div>
  <div class="noise"></div>

  <header class="site-header">
    <div class="header-inner">
      <div class="nerv-logo">
        <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="30,5 55,50 5,50" fill="none" stroke="#ff6b00" stroke-width="2"/>
          <polygon points="30,15 47,45 13,45" fill="none" stroke="#ff6b00" stroke-width="1" opacity="0.5"/>
          <circle cx="30" cy="38" r="5" fill="#ff6b00" opacity="0.8"/>
        </svg>
        <span class="logo-text">NERV</span>
      </div>
      <div class="header-title">
        <h1>DATABASE SYSTEM</h1>
        <p class="subtitle">CLASSIFIED — LEVEL ALPHA CLEARANCE REQUIRED</p>
      </div>
      <div class="header-status">
        <span class="status-dot"></span>
        <span id="clock">--:--:--</span>
      </div>
    </div>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="evangelions">
      <span class="tab-icon">◈</span> EVANGELIONS
    </button>
    <button class="tab-btn" data-tab="pilots">
      <span class="tab-icon">◉</span> PILOTOS
    </button>
  </nav>

  <main class="main-content">

    <!-- ===== EVANGELIONS TAB ===== -->
    <section id="tab-evangelions" class="tab-content active">
      <div class="section-header">
        <h2 class="section-title">UNIDADES EVANGELION</h2>
        <button id="eva-new-btn" class="btn-primary">+ REGISTRAR UNIDADE</button>
      </div>

      <div id="eva-form-wrapper" class="form-card hidden">
        <div class="form-card-header">
          <h3 id="eva-form-title">NOVA UNIDADE</h3>
          <button id="eva-cancel-btn" class="btn-ghost">✕ CANCELAR</button>
        </div>
        <form id="eva-form">
          <input type="hidden" id="eva-id" />
          <div class="form-grid">
            <div class="form-group">
              <label for="eva-unit">DESIGNAÇÃO DA UNIDADE</label>
              <input type="text" id="eva-unit" placeholder="Ex: Evangelion Unidade-01" required />
            </div>
            <div class="form-group">
              <label for="eva-type">TIPO</label>
              <input type="text" id="eva-type" placeholder="Ex: Protótipo, Produção em Massa" required />
            </div>
            <div class="form-group">
              <label for="eva-color">COR PRIMÁRIA</label>
              <input type="text" id="eva-color" placeholder="Ex: Roxo e Verde" required />
            </div>
            <div class="form-group">
              <label for="eva-pilot">PILOTO DESIGNADO</label>
              <input type="text" id="eva-pilot" placeholder="Ex: Shinji Ikari" />
            </div>
          </div>
          <div class="form-group">
            <label for="eva-abilities">CAPACIDADES / ARMAMENTOS</label>
            <textarea id="eva-abilities" rows="3" placeholder="Descreva as capacidades da unidade..." required></textarea>
          </div>
          <div class="form-group">
            <label for="eva-notes">OBSERVAÇÕES CONFIDENCIAIS</label>
            <textarea id="eva-notes" rows="2" placeholder="Notas adicionais..."></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary">▶ SALVAR REGISTRO</button>
          </div>
        </form>
        <p id="eva-message" class="form-message"></p>
      </div>

      <div id="eva-list" class="cards-grid">
        <div class="loading-state">
          <div class="loader"></div>
          <span>CARREGANDO DADOS DO SISTEMA...</span>
        </div>
      </div>
    </section>

    <!-- ===== PILOTS TAB ===== -->
    <section id="tab-pilots" class="tab-content hidden">
      <div class="section-header">
        <h2 class="section-title">PILOTOS SELECIONADOS</h2>
        <button id="pilot-new-btn" class="btn-primary">+ REGISTRAR PILOTO</button>
      </div>

      <div id="pilot-form-wrapper" class="form-card hidden">
        <div class="form-card-header">
          <h3 id="pilot-form-title">NOVO PILOTO</h3>
          <button id="pilot-cancel-btn" class="btn-ghost">✕ CANCELAR</button>
        </div>
        <form id="pilot-form">
          <input type="hidden" id="pilot-id" />
          <div class="form-grid">
            <div class="form-group">
              <label for="pilot-name">NOME COMPLETO</label>
              <input type="text" id="pilot-name" placeholder="Ex: Rei Ayanami" required />
            </div>
            <div class="form-group">
              <label for="pilot-codename">CODINOME</label>
              <input type="text" id="pilot-codename" placeholder="Ex: Maravilha" required />
            </div>
            <div class="form-group">
              <label for="pilot-age">IDADE</label>
              <input type="number" id="pilot-age" min="1" max="99" placeholder="14" required />
            </div>
            <div class="form-group">
              <label for="pilot-sync">TAXA DE SINCRONIA (%)</label>
              <input type="number" id="pilot-sync" min="0" max="400" placeholder="Ex: 400" required />
            </div>
            <div class="form-group">
              <label for="pilot-status">STATUS OPERACIONAL</label>
              <select id="pilot-status" required>
                <option value="Ativo">ATIVO</option>
                <option value="Inativo">INATIVO</option>
                <option value="Desaparecido">DESAPARECIDO</option>
                <option value="Terceira Impacto">TERCEIRA IMPACTO</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="pilot-bio">FICHA PSICOLÓGICA / BIO</label>
            <textarea id="pilot-bio" rows="3" placeholder="Resumo do perfil do piloto..." required></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary">▶ SALVAR REGISTRO</button>
          </div>
        </form>
        <p id="pilot-message" class="form-message"></p>
      </div>

      <div id="pilot-list" class="cards-grid">
        <div class="loading-state">
          <div class="loader"></div>
          <span>CARREGANDO DADOS DO SISTEMA...</span>
        </div>
      </div>
    </section>

  </main>

  <!-- Modal de confirmação -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-icon">⚠</div>
      <h3>CONFIRMAR EXCLUSÃO</h3>
      <p id="confirm-text">Deseja remover este registro permanentemente?</p>
      <div class="modal-actions">
        <button id="confirm-yes" class="btn-danger">CONFIRMAR</button>
        <button id="confirm-no" class="btn-ghost">CANCELAR</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
